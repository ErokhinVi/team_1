<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=414,initial-scale=1" />
  <title>Райф · мобильный банк · проверка связи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f6f3ec;
      --surface:   #ffffff;
      --rule:      #e3ddcc;
      --text:      #1f1d18;
      --text-2:    #5a564c;
      --muted:     #8a857a;
      --raiff:     #FFE600;
      --raiff-soft:#fff7a0;
      --good:      #2f7a3a;
      --warn:      #a4662d;
      --bad:       #b14b32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Geist", -apple-system, system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .phone {
      max-width: 420px; margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      box-shadow: 0 0 60px rgba(60,52,40,0.08);
    }
    .topbar {
      background: var(--text); color: var(--bg);
      padding: 28px 22px 16px;
    }
    .topbar .logo {
      width: 26px; height: 26px;
      background: var(--raiff); display: inline-block;
      border-radius: 4px; vertical-align: middle;
      margin-right: 10px;
    }
    .topbar .name {
      font-weight: 500; font-size: 16px; vertical-align: middle;
    }
    .topbar .who {
      font-size: 12px; color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .lang-btn {
      float: right; margin-top: -28px;
      background: rgba(255,255,255,0.15); border: 0;
      color: var(--bg); font-family: inherit; font-size: 12px;
      font-weight: 500; padding: 4px 10px; border-radius: 20px;
      cursor: pointer; letter-spacing: 0.05em;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.25); }

    .balance {
      padding: 26px 22px 22px;
      background: linear-gradient(180deg, var(--text) 0%, #2c2823 100%);
      color: var(--bg);
    }
    .balance .l {
      font-size: 11px; opacity: 0.6;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .balance .v {
      font-size: 32px; font-weight: 500; margin-top: 6px;
      letter-spacing: -0.01em;
    }
    .balance .v .cur { font-size: 18px; opacity: 0.7; margin-left: 4px; }

    .tabs {
      display: flex; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 5;
    }
    .tabs button {
      flex: 1;
      padding: 14px 8px;
      background: transparent; border: 0;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--text-2);
      cursor: pointer; position: relative;
      transition: color 160ms;
    }
    .tabs button.active { color: var(--text); }
    .tabs button.active::after {
      content: ""; position: absolute;
      left: 24%; right: 24%; bottom: 0;
      height: 2px; background: var(--text);
    }

    .tab-pane { display: none; padding: 22px; }
    .tab-pane.show { display: block; }

    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin: 6px 0 10px;
    }

    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 12px;
      color: var(--text-2); margin-bottom: 4px;
    }
    .form-row input, .form-row select {
      width: 100%; padding: 10px 12px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--rule); border-radius: 6px;
      font-family: inherit; font-size: 14px;
      transition: border-color 160ms;
    }
    .form-row input:focus, .form-row select:focus {
      outline: 0; border-color: var(--text);
    }

    .btn {
      width: 100%; padding: 13px;
      background: var(--text); color: var(--bg);
      border: 0; border-radius: 8px;
      font-family: inherit; font-weight: 500; font-size: 14px;
      letter-spacing: 0.01em; cursor: pointer;
      transition: background 160ms;
    }
    .btn:hover { background: #2c2823; }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: var(--raiff); color: var(--text);
    }
    .btn.primary:hover { background: #fff04a; }

    .tx-list { display: flex; flex-direction: column; gap: 0; }
    .tx-row {
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
      display: grid; grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .tx-row:last-child { border-bottom: 0; }
    .tx-row .desc { font-size: 13px; }
    .tx-row .ts { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .tx-row .amt { font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
    .tx-row .amt.minus { color: var(--text); }
    .tx-row .amt.plus  { color: var(--good); }

    .empty {
      text-align: center; padding: 60px 0;
      color: var(--muted); font-size: 13px;
    }

    .alert {
      margin-top: 18px; padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px; line-height: 1.5;
    }
    .alert.ok    { background: #e8f0e2; color: var(--good); }
    .alert.info  { background: #f0e8d0; color: var(--warn); }
    .alert.error { background: #f4dfd6; color: var(--bad); }

    .client-picker { padding: 14px 22px; border-bottom: 1px solid var(--rule); }
    .client-picker label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .client-picker select { width: 100%; margin-top: 4px; padding: 8px 10px;
      border: 1px solid var(--rule); background: var(--surface); border-radius: 6px;
      font-family: inherit; font-size: 13px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <div><span class="logo"></span><span class="name">Райф</span>
        <button class="lang-btn" id="lang-btn">EN</button>
      </div>
      <div class="who" id="topbar-who"></div>
    </div>

    <div class="balance">
      <div class="l" data-i18n="balance_label">остаток на счёте</div>
      <div class="v"><span id="balance-v">—</span><span class="cur">₽</span></div>
    </div>

    <div class="client-picker">
      <label data-i18n="profile_label">Профиль</label>
      <select id="client-select"></select>
    </div>

    <div style="margin:16px 22px 0;padding:10px 16px;background:var(--text);border-radius:10px;text-align:center;">
      <div style="font-weight:700;font-size:15px;color:var(--raiff);letter-spacing:0.01em" data-i18n="banner_top">⭐ Самая крутая кредитная карта! ⭐</div>
    </div>

    <div style="margin:10px 22px 0;padding:14px 16px;background:var(--raiff);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;" id="credit-banner">
      <div>
        <div style="font-weight:600;font-size:14px;color:var(--text)" data-i18n="banner_title">Кредитная карта</div>
        <div style="font-size:12px;color:var(--text);opacity:0.7;margin-top:2px" data-i18n="banner_sub">Бесплатно за 1 минуту</div>
      </div>
      <div style="font-size:22px">💳</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="transfers" data-i18n="tab_transfers">Переводы</button>
      <button class="tab" data-tab="credit" data-i18n="tab_credit">Кредитная карта</button>
    </div>

    <div class="tab-pane show" data-pane="transfers">
      <div class="section-title" data-i18n="transfer_title">Перевести</div>
      <form id="transfer-form" autocomplete="off">
        <div class="form-row">
          <label data-i18n="transfer_to">Кому</label>
          <input name="to" data-i18n-placeholder="transfer_to_ph" placeholder="имя или ID получателя" />
        </div>
        <div class="form-row">
          <label data-i18n="transfer_amount">Сумма, ₽</label>
          <input name="amount" type="number" min="1" placeholder="0" />
        </div>
        <button class="btn primary" type="submit" data-i18n="transfer_btn">Перевести</button>
      </form>
      <div id="transfer-result"></div>

      <div class="section-title" style="margin-top:24px" data-i18n="recent_ops">Последние операции</div>
      <div id="tx-list" class="tx-list"></div>
    </div>
    <div class="tab-pane" data-pane="credit">
      <div class="section-title" data-i18n="credit_apply_title">Подать заявку на кредитную карту</div>
      <div id="pre-approval-msg"></div>
      <div class="form-row">
        <label data-i18n="credit_select_client">Выберите клиента</label>
        <select id="credit-client-select"></select>
      </div>
      <button class="btn primary" id="credit-apply-btn" type="button" data-i18n="credit_apply_btn">Подать заявку</button>
      <div id="credit-apply-result"></div>

      <div class="section-title" style="margin-top:24px" data-i18n="my_cards">Мои карты</div>
      <div id="cards-list"></div>
    </div>
  </div>

  <script>
  (function(){
    "use strict";

    // ---- i18n ----
    const T = {
      ru: {
        balance_label:      "остаток на счёте",
        profile_label:      "Профиль",
        tab_transfers:      "Переводы",
        tab_credit:         "Кредитная карта",
        banner_top:         "⭐ Самая крутая кредитная карта! ⭐",
        banner_title:       "Кредитная карта",
        banner_sub:         "Бесплатно за 1 минуту",
        transfer_title:     "Перевести",
        transfer_to:        "Кому",
        transfer_to_ph:     "имя или ID получателя",
        transfer_amount:    "Сумма, ₽",
        transfer_btn:       "Перевести",
        recent_ops:         "Последние операции",
        credit_apply_title: "Подать заявку на кредитную карту",
        credit_select_client:"Выберите клиента",
        credit_apply_btn:   "Подать заявку",
        my_cards:           "Мои карты",
        activate_btn:       "Активировать карту",
        card_active:        "Активна",
        card_inactive:      "Не активирована",
        card_number:        "Номер карты",
        card_limit:         "Лимит",
        preapproval_ok:     (limit) => `✓ Вы, скорее всего, получите одобрение — предварительный лимит до ${limit} ₽.`,
        preapproval_overdue:"У вас есть история просрочек — решение будет принято индивидуально.",
        preapproval_neutral:"Заполните заявку — мы рассмотрим её индивидуально.",
        applying:           "Отправляем заявку…",
        approved:           (limit, rate, reason) => `Заявка одобрена! Лимит: ${limit} ₽${rate ? ` · Ставка: ${rate}% годовых` : ""}<br/>${reason || ""}`,
        declined:           (reason) => `Отказ: ${reason || "нет данных"}`,
        no_profile:         "список клиентов загружается, попробуй ещё раз",
        no_cards:           "Карт пока нет",
        tx_types: {
          transfer_in:    "Перевод входящий",
          transfer_out:   "Перевод исходящий",
          card_purchase:  "Оплата картой",
          atm_withdraw:   "Снятие в банкомате",
          salary:         "Зарплата",
          utility_payment:"Коммунальные",
        },
        sent: (amount, to) => `Отправлено ${amount} ₽<br/>получатель: ${to}`,
        err_fields:  "введи получателя и сумму",
        err_server:  "сервер не ответил",
        err_tx:      "Не удалось загрузить операции",
        no_tx:       "Операций пока нет",
      },
      en: {
        balance_label:      "account balance",
        profile_label:      "Profile",
        tab_transfers:      "Transfers",
        tab_credit:         "Credit Card",
        banner_top:         "⭐ The best credit card! ⭐",
        banner_title:       "Credit Card",
        banner_sub:         "Free in 1 minute",
        transfer_title:     "Send money",
        transfer_to:        "To",
        transfer_to_ph:     "name or recipient ID",
        transfer_amount:    "Amount, ₽",
        transfer_btn:       "Send",
        recent_ops:         "Recent transactions",
        credit_apply_title: "Apply for a credit card",
        credit_select_client:"Select customer",
        credit_apply_btn:   "Apply now",
        my_cards:           "My cards",
        activate_btn:       "Activate card",
        card_active:        "Active",
        card_inactive:      "Not activated",
        card_number:        "Card number",
        card_limit:         "Limit",
        preapproval_ok:     (limit) => `✓ You are likely to be approved — estimated limit up to ${limit} ₽.`,
        preapproval_overdue:"You have a history of overdue payments — your application will be reviewed individually.",
        preapproval_neutral:"Submit your application — we will review it individually.",
        applying:           "Submitting application…",
        approved:           (limit, rate, reason) => `Approved! Limit: ${limit} ₽${rate ? ` · Rate: ${rate}% p.a.` : ""}<br/>${reason || ""}`,
        declined:           (reason) => `Declined: ${reason || "no details"}`,
        no_profile:         "client list is loading, please try again",
        no_cards:           "No cards yet",
        tx_types: {
          transfer_in:    "Incoming transfer",
          transfer_out:   "Outgoing transfer",
          card_purchase:  "Card payment",
          atm_withdraw:   "ATM withdrawal",
          salary:         "Salary",
          utility_payment:"Utilities",
        },
        sent: (amount, to) => `Sent ${amount} ₽<br/>recipient: ${to}`,
        err_fields:  "enter recipient and amount",
        err_server:  "server did not respond",
        err_tx:      "Failed to load transactions",
        no_tx:       "No transactions yet",
      },
    };

    T.de = {
      balance_label:      "Kontostand",
      profile_label:      "Profil",
      tab_transfers:      "Überweisungen",
      tab_credit:         "Kreditkarte",
      banner_top:         "⭐ Die beste Kreditkarte! ⭐",
      banner_title:       "Kreditkarte",
      banner_sub:         "Kostenlos in 1 Minute",
      transfer_title:     "Geld senden",
      transfer_to:        "An",
      transfer_to_ph:     "Name oder Empfänger-ID",
      transfer_amount:    "Betrag, ₽",
      transfer_btn:       "Senden",
      recent_ops:         "Letzte Transaktionen",
      credit_apply_title: "Kreditkarte beantragen",
      credit_select_client:"Kunde auswählen",
      credit_apply_btn:   "Jetzt beantragen",
      my_cards:           "Meine Karten",
      activate_btn:       "Karte aktivieren",
      card_active:        "Aktiv",
      card_inactive:      "Nicht aktiviert",
      card_number:        "Kartennummer",
      card_limit:         "Limit",
      preapproval_ok:     (limit) => `✓ Sie werden wahrscheinlich genehmigt — geschätztes Limit bis zu ${limit} ₽.`,
      preapproval_overdue:"Sie haben eine Geschichte von Zahlungsverzügen — Ihr Antrag wird individuell geprüft.",
      preapproval_neutral:"Stellen Sie Ihren Antrag — wir prüfen ihn individuell.",
      applying:           "Antrag wird gesendet…",
      approved:           (limit, rate, reason) => `Genehmigt! Limit: ${limit} ₽${rate ? ` · Zinssatz: ${rate}% p.a.` : ""}<br/>${reason || ""}`,
      declined:           (reason) => `Abgelehnt: ${reason || "keine Details"}`,
      no_profile:         "Kundenliste wird geladen, bitte erneut versuchen",
      no_cards:           "Noch keine Karten",
      tx_types: {
        transfer_in:    "Eingehende Überweisung",
        transfer_out:   "Ausgehende Überweisung",
        card_purchase:  "Kartenzahlung",
        atm_withdraw:   "Geldautomaten-Abhebung",
        salary:         "Gehalt",
        utility_payment:"Nebenkosten",
      },
      sent: (amount, to) => `Gesendet ${amount} ₽<br/>Empfänger: ${to}`,
      err_fields:  "Empfänger und Betrag eingeben",
      err_server:  "Server hat nicht geantwortet",
      err_tx:      "Transaktionen konnten nicht geladen werden",
      no_tx:       "Noch keine Transaktionen",
    };

    const langs = ["ru", "en", "de"];
    const langLabels = { ru: "EN", en: "DE", de: "RU" };
    let lang = localStorage.getItem("raif_lang") || "ru";
    const langBtn = document.getElementById("lang-btn");

    function applyLang() {
      const t = T[lang];
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        if (typeof t[key] === "string") el.textContent = t[key];
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (t[key]) el.placeholder = t[key];
      });
      langBtn.textContent = langLabels[lang];
      localStorage.setItem("raif_lang", lang);
    }

    langBtn.addEventListener("click", () => {
      lang = langs[(langs.indexOf(lang) + 1) % langs.length];
      applyLang();
    });

    applyLang();

    const fmt = new Intl.NumberFormat("ru-RU");
    const sel = document.getElementById("client-select");
    const balanceV = document.getElementById("balance-v");
    const topbarWho = document.getElementById("topbar-who");
    const txList = document.getElementById("tx-list");
    const transferResult = document.getElementById("transfer-result");

    // ---- табы ----
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("show"));
        btn.classList.add("active");
        document.querySelector(`[data-pane="${btn.dataset.tab}"]`).classList.add("show");
      });
    });

    // ---- загрузка списка клиентов в селект ----
    async function loadClients() {
      try {
        const r = await fetch("/clients?limit=200");
        const d = await r.json();
        const items = (d.items || []).slice(0, 80);
        sel.innerHTML = items.map(c =>
          `<option value="${c.id}" data-balance="${c.balance_rub}" data-name="${c.name}" data-segment="${c.segment}">
            ${c.name}
          </option>`
        ).join("");
        creditClientSel.innerHTML = items.map(c =>
          `<option value="${c.id}" data-income="${c.income_rub || 0}" data-overdue="${c.has_overdue_history || false}">${c.name}</option>`
        ).join("");
        showPreApproval();
        if (items.length) onPickClient();
      } catch(e) { console.error(e); }
    }

    function onPickClient() {
      const opt = sel.selectedOptions[0];
      if (!opt) return;
      balanceV.textContent = fmt.format(+opt.dataset.balance || 0);
      topbarWho.textContent = opt.dataset.name;
      loadTx(opt.value);
    }
    sel.addEventListener("change", onPickClient);

    // ---- последние операции ----
    async function loadTx(clientId) {
      try {
        const r = await fetch(`/transactions/${clientId}?limit=10`);
        const d = await r.json();
        const items = d.items || [];
        if (!items.length) {
          txList.innerHTML = `<div class="empty">${T[lang].no_tx}</div>`;
          return;
        }
        txList.innerHTML = items.map(t => {
          const sign = t.amount_rub >= 0 ? "plus" : "minus";
          const amt = (t.amount_rub >= 0 ? "+" : "−") + fmt.format(Math.abs(t.amount_rub));
          const niceTs = t.ts.replace("T", " ").slice(0, 16);
          return `<div class="tx-row">
            <div>
              <div class="desc">${typeLabel(t.type)}</div>
              <div class="ts">${niceTs}</div>
            </div>
            <div class="amt ${sign}">${amt} ₽</div>
          </div>`;
        }).join("");
      } catch(e) {
        txList.innerHTML = `<div class="empty">${T[lang].err_tx}</div>`;
      }
    }

    function typeLabel(type) {
      return T[lang].tx_types[type] || type;
    }

    function setBalance(newAmount) {
      balanceV.textContent = fmt.format(newAmount);
      const opt = sel.selectedOptions[0];
      if (opt) opt.dataset.balance = newAmount;
    }

    // ---- форма перевода ----
    const transferForm = document.getElementById("transfer-form");
    transferForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      transferResult.innerHTML = "";
      const opt = sel.selectedOptions[0];
      if (!opt) return;
      const data = new FormData(ev.target);
      const to = (data.get("to") || "").trim();
      const amount = +data.get("amount");
      if (!to || amount <= 0) {
        transferResult.innerHTML = `<div class="alert error">${T[lang].err_fields}</div>`;
        return;
      }

      const payload = {
        from_client_id: opt.value,
        to: to,
        amount_rub: amount,
      };
      try {
        const r = await fetch("/api/transfer", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (r.ok) {
          const kindLabel = d.kind === "internal"
            ? `${d.to} (${lang === "ru" ? "клиент банка" : "bank client"})`
            : `${d.to} (${lang === "ru" ? "внешний счёт" : "external account"})`;
          transferResult.innerHTML =
            `<div class="alert ok">${T[lang].sent(fmt.format(d.amount_rub), kindLabel)}</div>`;
          setBalance(d.new_balance_rub);
          transferForm.reset();
          loadTx(opt.value);
        } else {
          transferResult.innerHTML =
            `<div class="alert error">${d.detail || "ошибка"}</div>`;
        }
      } catch(e) {
        transferResult.innerHTML =
          `<div class="alert error">${T[lang].err_server}</div>`;
      }
    });

    // ---- кредитная карта ----
    const preApprovalMsg = document.getElementById("pre-approval-msg");

    function showPreApproval() {
      const opt = creditClientSel.selectedOptions[0];
      if (!opt) return;
      const t = T[lang];
      const income = +opt.dataset.income || 0;
      const overdue = opt.dataset.overdue === "true";
      if (overdue) {
        preApprovalMsg.innerHTML = `<div class="alert info" style="margin-bottom:12px">${t.preapproval_overdue}</div>`;
      } else if (income > 0) {
        const limit = Math.round(income * 12 * 0.30);
        preApprovalMsg.innerHTML = `<div class="alert ok" style="margin-bottom:12px">${t.preapproval_ok(fmt.format(limit))}</div>`;
      } else {
        preApprovalMsg.innerHTML = `<div class="alert info" style="margin-bottom:12px">${t.preapproval_neutral}</div>`;
      }
    }

    const creditClientSel = document.getElementById("credit-client-select");
    const applyBtn = document.getElementById("credit-apply-btn");
    const applyResult = document.getElementById("credit-apply-result");
    const cardsList = document.getElementById("cards-list");

    creditClientSel.addEventListener("change", () => {
      showPreApproval();
      loadCards(creditClientSel.selectedOptions[0]?.value);
    });

    async function loadCards(clientId) {
      try {
        const r = await fetch(`/api/credit-cards?customer_id=${clientId}`);
        const d = await r.json();
        const items = d.items || d.cards || [];
        if (!items.length) {
          cardsList.innerHTML = `<div class="empty">${T[lang].no_cards}</div>`;
          return;
        }
        cardsList.innerHTML = items.map(c => {
          const t = T[lang];
          const statusLabel = c.status === "active" ? t.card_active : t.card_inactive;
          const statusColor = c.status === "active" ? "var(--good)" : "var(--warn)";
          const activateBtn = c.status !== "active"
            ? `<button class="btn" style="margin-top:8px" onclick="activateCard('${c.card_id}')">${t.activate_btn}</button>`
            : "";
          return `<div style="padding:14px;border:1px solid var(--rule);border-radius:8px;margin-bottom:12px;">
            <div style="font-size:12px;color:var(--muted)">${t.card_number}</div>
            <div style="font-weight:500;letter-spacing:0.08em">${c.card_number || c.card_id}</div>
            <div style="margin-top:6px;font-size:12px;color:${statusColor}">${statusLabel}</div>
            <div style="font-size:12px;color:var(--text-2);margin-top:4px">${t.card_limit}: ${fmt.format(c.credit_limit_rub || c.limit || 0)} ₽</div>
            ${activateBtn}
          </div>`;
        }).join("");
      } catch(e) {
        cardsList.innerHTML = `<div class="empty">Не удалось загрузить карты</div>`;
      }
    }

    window.activateCard = async function(cardId) {
      const opt = sel.selectedOptions[0];
      try {
        const r = await fetch(`/api/credit-cards/${cardId}/activate`, {method:"POST"});
        const d = await r.json();
        if (r.ok) {
          if (opt) loadCards(opt.value);
        } else {
          alert(d.detail || "ошибка активации");
        }
      } catch(e) { alert("сервер не ответил"); }
    };

    applyBtn.addEventListener("click", async () => {
      const opt = creditClientSel.selectedOptions[0] || sel.selectedOptions[0];
      if (!opt) { applyResult.innerHTML = `<div class="alert error">${T[lang].no_profile}</div>`; return; }
      applyResult.innerHTML = `<div class="alert info">${T[lang].applying}</div>`;
      try {
        const r = await fetch("/api/credit-apply", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({customer_id: opt.value}),
        });
        const d = await r.json();
        const t = T[lang];
        if (r.ok && d.approved) {
          applyResult.innerHTML = `<div class="alert ok">${t.approved(fmt.format(d.limit), d.rate_pct, d.reason)}</div>`;
          loadCards(opt.value);
        } else if (r.ok) {
          applyResult.innerHTML = `<div class="alert error">${t.declined(d.reason)}</div>`;
        } else {
          applyResult.innerHTML = `<div class="alert error">${d.detail || "ошибка"}</div>`;
        }
      } catch(e) {
        applyResult.innerHTML = `<div class="alert error">${T[lang].err_server}</div>`;
      }
    });

    // reload cards when switching to credit tab
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.dataset.tab === "credit") {
          const opt = sel.selectedOptions[0];
          if (opt) loadCards(opt.value);
        }
      });
    });

    document.getElementById("credit-banner").addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("show"));
      document.querySelector('[data-tab="credit"]').classList.add("active");
      document.querySelector('[data-pane="credit"]').classList.add("show");
      const opt = sel.selectedOptions[0];
      if (opt) loadCards(opt.value);
    });

    loadClients();
  })();
  </script>
</body>
</html>
